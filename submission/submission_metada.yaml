ai_usage_summary: 
  Used ChatGPT for architecture discussion, debugging assistance,
  code review, scoring strategy design, and reasoning generation ideas.
  All ranking logic, feature engineering, embedding generation,
  scoring functions, and evaluation pipeline implementation were
  developed and validated manually.

methodology_summary: 
  Hybrid candidate ranking system combining semantic retrieval,
  explicit skill matching, behavioral signals, and profile
  consistency checks. Candidate career history and profile
  information are embedded separately using SentenceTransformers
  (all-MiniLM-L6-v2). Candidate relevance is measured against
  JD-specific career and profile embeddings. Skill matching uses
  normalized keyword matching with proficiency weighting for
  required and preferred skills. Behavioral scoring incorporates
  recruiter response rate, open-to-work status, activity recency,
  and notice period. Additional consistency checks penalize
  profiles whose experience history does not align with claimed
  experience or whose skills are unsupported by work history.
  Final ranking combines career similarity, behavioral signals,
  profile similarity, skill relevance, and honeypot penalties.

